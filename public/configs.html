<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wlaudio — Configs</title>
  <link rel="stylesheet" href="shared.css" />
  <script src="theme.js"></script>
  <link rel="stylesheet" href="themes.css" />
  <link rel="stylesheet" href="configs.css" />
</head>
<body>

  <div class="app-layout">

    <!-- ── Nav sidebar ────────────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <a href="/themes.html" class="sb-logo-icon">⬡</a>
        <span class="sb-logo-text">WLAUDIO</span>
        <span class="sb-version">0.5.0</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/"               class="sn-link"><span class="sn-icon">▪</span>DASHBOARD</a>
        <a href="/sessions.html"  class="sn-link"><span class="sn-icon">◈</span>SESSIONS</a>
        <a href="/analytics.html" class="sn-link"><span class="sn-icon">◫</span>ANALYTICS</a>
        <a href="/projects.html"  class="sn-link"><span class="sn-icon">◧</span>PROJECTS</a>
        <a href="/configs.html"   class="sn-link active"><span class="sn-icon">◩</span>CONFIGS</a>
        <a href="/themes.html"    class="sn-link"><span class="sn-icon">◐</span>THEMES</a>
        <a href="/terminal.html"  class="sn-link"><span class="sn-icon">▷</span>TERMINAL</a>
        <a href="/timeline.html"  class="sn-link"><span class="sn-icon">◑</span>TIMELINE</a>
      </nav>
      <div class="sidebar-bottom"></div>
    </aside>

    <!-- ── Configs content ───────────────────────────────────────────── -->
    <main class="cfg-main">

      <div id="cfg-loading" class="cfg-loading">LOADING…</div>

      <div id="cfg-content" class="hidden">

        <div class="cfg-page-title">GLOBAL CONFIG <span class="cfg-path">~/.claude/</span></div>

        <div class="cfg-section">
          <div class="cfg-section-title">Hooks <span id="cfg-global-hook-count" class="cfg-badge"></span></div>
          <div id="cfg-global-hooks"></div>
        </div>

        <div class="cfg-two-col">
          <div class="cfg-section">
            <div class="cfg-section-title">Allowed Tools <span id="cfg-allow-count" class="cfg-badge"></span></div>
            <div id="cfg-allow-list" class="cfg-rule-list"></div>
          </div>
          <div class="cfg-section">
            <div class="cfg-section-title">Denied Tools <span id="cfg-deny-count" class="cfg-badge"></span></div>
            <div id="cfg-deny-list" class="cfg-rule-list"></div>
          </div>
        </div>

        <div class="cfg-section" id="cfg-mcp-section">
          <div class="cfg-section-title">MCP Servers <span id="cfg-mcp-count" class="cfg-badge"></span></div>
          <div id="cfg-mcp-list"></div>
        </div>

        <div class="cfg-section" id="cfg-plugins-section">
          <div class="cfg-section-title">Plugins <span id="cfg-plugin-count" class="cfg-badge"></span></div>
          <div id="cfg-plugins-list"></div>
        </div>

        <div class="cfg-section" id="cfg-hook-scripts-section">
          <div class="cfg-section-title">Hook Scripts <span id="cfg-hook-script-count" class="cfg-badge"></span></div>
          <div id="cfg-hook-scripts"></div>
        </div>

        <div class="cfg-section" id="cfg-skills-section">
          <div class="cfg-section-title">Skills &amp; Commands <span id="cfg-skills-count" class="cfg-badge"></span></div>
          <div id="cfg-skills-list"></div>
        </div>

        <div class="cfg-section" id="cfg-global-md-section">
          <div class="cfg-section-title cfg-expandable" data-target="cfg-global-md-body">
            <span>Global CLAUDE.md</span>
            <span class="cfg-expand-icon">▶</span>
          </div>
          <div id="cfg-global-md-body" class="hidden">
            <div id="cfg-global-md-lint" class="cfg-lint-panel hidden"></div>
            <pre id="cfg-global-md" class="cfg-md-pre"></pre>
          </div>
        </div>

        <div class="cfg-page-title" style="margin-top:1.5rem">PROJECT CONFIGS <span id="cfg-proj-count" class="cfg-badge"></span></div>
        <div id="cfg-projects"></div>

      </div>
    </main>
  </div>

  <script src="learning.js"></script>
  <script src="configs.js"></script>

</body>
</html>
